services:
  app:
    image: ${APP_IMAGE:-ghcr.io/cledson96/lanchonete:latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      WHATSAPP_SESSION_PATH: .runtime/whatsapp-session
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_HOST_PORT:-127.0.0.1:3001}:3000"
    volumes:
      - whatsapp-session:/app/.runtime/whatsapp-session
      - menu-uploads:/app/public/uploads/menu

volumes:
  whatsapp-session:
  menu-uploads:
