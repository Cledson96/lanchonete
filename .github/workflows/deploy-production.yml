name: Deploy production

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/cledson96/lanchonete

jobs:
  deploy:
    name: Build, publish, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          APP_AUTH_SECRET: ci-build-secret
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate Prisma schema
        env:
          APP_AUTH_SECRET: ci-build-secret
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
        run: npm run prisma:validate

      - name: Build Next.js
        env:
          APP_AUTH_SECRET: ci-build-secret
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          USE_LOCAL_DB_ON_START: "true"
          NEXT_PUBLIC_SITE_URL: ${{ secrets.PRODUCTION_SITE_URL }}
          NEXT_PUBLIC_WHATSAPP_URL: ${{ secrets.PRODUCTION_WHATSAPP_URL }}
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.PRODUCTION_SITE_URL }}
            NEXT_PUBLIC_WHATSAPP_URL=${{ secrets.PRODUCTION_WHATSAPP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_IMAGE
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file .env.production pull app
            docker compose --env-file .env.production run --rm app npx prisma migrate deploy
            docker compose --env-file .env.production up -d
            docker image prune -f
